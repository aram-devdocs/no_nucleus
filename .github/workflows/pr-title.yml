name: PR Title

# Advisory check: the squash-merge title becomes the commit on master that release-please reads, so it must be a
# conventional commit (feat:, fix:, chore:, docs:, …). Not a required status check — 'test' remains the gate.

on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
