name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Always-on pure gate: the Unity-free projects build and test in the cloud without the proprietary
  # game DLLs. The full solution (which references Assembly-CSharp) is gated below on lib/ being present.
  headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Core logic tests (Unity-free)
        run: dotnet test tests/Core/CommanderLayer.Tests.csproj -c Release

      - name: Architecture rules (Cecil dependency-graph guard)
        run: dotnet test tests/Nucleus.Architecture.Tests/Nucleus.Architecture.Tests.csproj -c Release

      - name: Campaign simulation (headless e2e over CommanderBrain)
        run: dotnet test tests/Nucleus.Sim.Tests/Nucleus.Sim.Tests.csproj -c Release

      # The full solution build + game-contract tests require the proprietary game DLLs in lib/, which are
      # gitignored (the game's IP) and produced locally by scripts/setup-sandbox.ps1. On GitHub-hosted
      # runners they are absent, so this step no-ops; a self-hosted runner with lib/ provisioned runs the
      # full gate. The proprietary DLL never enters cloud CI.
      - name: Full check (only if game DLLs present)
        run: |
          if [ -f lib/Assembly-CSharp.dll ]; then
            bash scripts/check.sh
          else
            echo "lib/Assembly-CSharp.dll absent — skipping game-coupled build/tests (run scripts/audit.ps1 locally)."
          fi
